<div class="auth-page d-flex align-items-center justify-content-center">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#89b4fa"/>
        <path d="M10 28l8-16 4 8 4-6 4 14" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>DB Chatbot</span>
    </div>
    <h2 class="auth-title">Sign in</h2>
    <p class="auth-subtitle">Welcome back — enter your details</p>

    <div class="alert alert-danger" ng-if="vm.error">{{ vm.error }}</div>
    <div class="alert alert-info" ng-if="$root.sessionExpired">Your session expired. Please sign in again.</div>

    <form ng-submit="vm.login()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" ng-model="vm.loginForm.email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-with-toggle">
          <input ng-attr-type="{{ vm.showPassword ? 'text' : 'password' }}" class="form-control" ng-model="vm.loginForm.password" placeholder="••••••••" required />
          <button type="button" class="toggle-pw-btn" ng-click="vm.togglePassword()">
            {{ vm.showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" ng-disabled="vm.loading">
        <span ng-if="!vm.loading">Sign in</span>
        <span ng-if="vm.loading">Signing in…</span>
      </button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="#/register">Register</a></p>
  </div>
</div>
